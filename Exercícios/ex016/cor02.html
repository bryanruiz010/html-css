<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiante em CSS</title>
    <style>
        * { /*configuração globais das CSS */
            height: 100%;
        }

        body {
            background-color: aqua;
            background-image: linear-gradient(to top, #4B88F3, #4BE0F2, #F2DE4B);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiante</h1>
</body>
</html>
